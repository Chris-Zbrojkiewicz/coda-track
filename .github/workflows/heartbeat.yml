name: Demo Heartbeat

on:
  schedule:
    # 3 pings/week to keep free-tier Supabase projects warm.
    - cron: "0 13 * * 1,3,5"
  workflow_dispatch:

jobs:
  heartbeat:
    name: Ping demo health route
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      HEARTBEAT_URL: ${{ secrets.HEARTBEAT_URL }}

    steps:
      - name: Validate configuration
        run: |
          set -euo pipefail

          if [ -z "${HEARTBEAT_URL}" ]; then
            echo "ERROR: HEARTBEAT_URL is not set"
            exit 1
          fi

      - name: Ping health route (with retries)
        run: |
          set -euo pipefail

          echo "Heartbeat target: ${HEARTBEAT_URL}"

          for i in 1 2 3; do
            status=$(curl -o /dev/null -s -w "%{http_code}" --max-time 20 "${HEARTBEAT_URL}" || echo "000")

            echo "Attempt ${i} -> HTTP ${status} at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"

            if [ "${status}" -ge 200 ] && [ "${status}" -lt 300 ]; then
              echo "Heartbeat OK"
              exit 0
            fi

            sleep 5
          done

          echo "Heartbeat failed after retries"
          exit 1
